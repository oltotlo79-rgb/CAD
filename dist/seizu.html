<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>製図ツール</title>
<style>
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  display: flex; flex-direction: column;
  font-family: "Yu Gothic UI", "Meiryo", sans-serif; font-size: 13px;
  background: #2b2e33; color: #ddd;
}
#toolbar {
  display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  padding: 6px 10px; background: #1e2126; border-bottom: 1px solid #000;
}
#toolbar .group { display: flex; gap: 4px; align-items: center; }
#toolbar .group + .group { border-left: 1px solid #444; padding-left: 12px; }
button { background: #3a3f46; color: #ddd; border: 1px solid #555; border-radius: 3px; padding: 3px 10px; cursor: pointer; }
button:hover { background: #4a5058; }
button.tool.active { background: #0b6bcb; border-color: #0b6bcb; color: #fff; }
select, input { background: #23262b; color: #ddd; border: 1px solid #555; border-radius: 3px; padding: 2px 4px; }
input:disabled, select:disabled { opacity: 0.4; }
#layer-panel { position: relative; }
#layer-panel summary { cursor: pointer; padding: 3px 8px; background: #3a3f46; border: 1px solid #555; border-radius: 3px; list-style: none; }
#layer-list {
  position: absolute; right: 0; top: 100%; z-index: 20; min-width: 200px;
  background: #23262b; border: 1px solid #555; border-radius: 3px; padding: 6px 10px;
  display: grid; grid-template-columns: auto auto auto; gap: 4px 12px; align-items: center;
}
#layer-list .head { color: #889; font-size: 11px; }
#restore-banner {
  display: none; gap: 10px; align-items: center;
  padding: 6px 10px; background: #6b5300; color: #ffe9a8;
  border-bottom: 1px solid #000;
}
#canvas-wrap { flex: 1; min-height: 0; position: relative; }
#text-entry {
  position: absolute; display: none; z-index: 5; min-width: 160px;
  background: #fff; color: #111; border: 2px solid #0b6bcb;
}
#canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }
#numpanel {
  display: flex; gap: 8px; align-items: center;
  padding: 5px 10px; background: #1e2126; border-top: 1px solid #000;
}
#numpanel .hint { color: #888; margin-left: auto; }
#statusbar { padding: 4px 10px; background: #14161a; color: #9ab; font-family: Consolas, monospace; }

</style>
</head>
<body>
<header id="toolbar">
  <div class="group">
    <button id="file-new">新規</button>
    <button id="file-open">開く</button>
    <button id="file-save">保存</button>
    <button id="file-saveas">名前を付けて保存</button>
    <button id="export-svg">SVG出力</button>
    <button id="print">印刷</button>
  </div>
  <div class="group">
    <button id="zoom-in" title="拡大">＋</button>
    <button id="zoom-out" title="縮小">－</button>
    <button id="zoom-fit" title="用紙全体を表示">全体</button>
  </div>
  <div class="group">
    <button class="tool active" data-tool="select">選択</button>
    <button class="tool" data-tool="line">直線</button>
    <button class="tool" data-tool="polyline">連続線</button>
    <button class="tool" data-tool="rect">矩形</button>
    <button class="tool" data-tool="circle">円</button>
    <button class="tool" data-tool="arc">円弧</button>
    <button class="tool" data-tool="ellipse">楕円</button>
    <button class="tool" data-tool="spline">スプライン</button>
    <button class="tool" data-tool="text">文字</button>
    <button class="tool" data-tool="origin">原点設定</button>
  </div>
  <div class="group">
    <button class="tool" data-tool="dim">寸法</button>
    <button class="tool" data-tool="dia">φ</button>
    <button class="tool" data-tool="rad">R</button>
    <button class="tool" data-tool="angle">角度</button>
    <button class="tool" data-tool="chamfer">C</button>
    <button class="tool" data-tool="leader">引出線</button>
    <button class="tool" data-tool="roughness">粗さ</button>
    <button class="tool" data-tool="fcf">公差枠</button>
    <button class="tool" data-tool="hatch">ハッチ</button>
    <input id="hatch-angle" size="3" value="45" title="ハッチ角度(°)">
    <input id="hatch-space" size="3" value="3" title="ハッチ間隔(用紙mm)">
    <button class="tool" data-tool="balloon">バルーン</button>
    <button class="tool" data-tool="bom">部品表</button>
  </div>
  <div class="group">
    <button id="undo">元に戻す</button>
    <button id="redo">やり直し</button>
    <button id="rotate">回転90°</button>
    <button id="mirror-x">左右反転</button>
    <button id="mirror-y">上下反転</button>
  </div>
  <div class="group">
    <button class="tool" data-tool="trim">トリム</button>
    <button class="tool" data-tool="extend">延長</button>
    <button class="tool" data-tool="offset">オフセット</button>
    <input id="offset-dist" size="4" value="10" title="オフセット距離(mm)">
    <button class="tool" data-tool="fillet">フィレット</button>
    <button class="tool" data-tool="chamferEdit">面取り</button>
    <input id="fillet-r" size="4" value="5" title="フィレット半径 / 面取りサイズ(mm)">
  </div>
  <div class="group">
    <label>線種 <select id="line-style">
      <option value="outline" selected>外形線</option>
      <option value="hidden">かくれ線</option>
      <option value="center">中心線</option>
      <option value="phantom">想像線</option>
      <option value="aux">補助線</option>
    </select></label>
  </div>
  <div class="group">
    <label>用紙 <select id="paper-size">
      <option>A2</option><option selected>A3</option><option>A4</option>
      <option>B3</option><option>B4</option><option>B5</option>
    </select></label>
    <label><select id="paper-orientation">
      <option value="landscape" selected>横</option>
      <option value="portrait">縦</option>
    </select></label>
    <label>縮尺 <input id="scale-input" size="6" value="1:1"></label>
    <label>グリッド <select id="grid-mode">
      <option value="auto" selected>自動</option>
      <option value="manual">手動</option>
    </select></label>
    <select id="grid-step" disabled>
      <option>10</option><option>5</option><option>2</option>
      <option selected>1</option><option>0.5</option><option>0.1</option>
    </select>
    <label><input type="checkbox" id="grid-snap" checked>スナップ</label>
    <label><input type="checkbox" id="osnap" checked>点スナップ</label>
  </div>
  <div class="group">
    <label><input type="checkbox" id="proj-guides" checked>投影ガイド</label>
    <button class="tool" data-tool="mirror45">45°線配置</button>
    <label><input type="checkbox" id="show45" checked>45°線</label>
    <details id="layer-panel">
      <summary>レイヤー</summary>
      <div id="layer-list"></div>
    </details>
  </div>
</header>
<div id="restore-banner">
  <span>前回、未保存の変更が残ったまま終了したようです。復元しますか?</span>
  <button id="restore-yes">復元する</button>
  <button id="restore-no">破棄する</button>
</div>
<main id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <input id="text-entry" placeholder="文字を入力してEnter">
</main>
<section id="numpanel">
  <span>直線の数値入力:</span>
  <label>始点X <input id="num-x" size="7"></label>
  <label>Y <input id="num-y" size="7"></label>
  <label>長さ <input id="num-len" size="7"></label>
  <label>角度 <input id="num-ang" size="7" value="0"></label>
  <button id="num-draw">作図</button>
  <span class="hint">Escで中止 / 連続線はEnterで完了 / 寸法値・表題欄・部品表のセルはダブルクリックで記入</span>
</section>
<footer id="statusbar">&nbsp;</footer>
